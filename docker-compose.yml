version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: linkveil-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    environment:
      - ALLOWED_ORIGINS=http://localhost:5173,http://frontend:5173
      # Provide dummy tokens for local build, ideally override in .env
      - HF_TOKEN=${HF_TOKEN:-dummy}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-dummy}
    networks:
      - linkveil-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: linkveil-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - linkveil-net

networks:
  linkveil-net:
    driver: bridge
